<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teto | Page</title>
    <style>
        /* This CSS makes the page look like a legitimate app to fool the user */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            transition: background-color 0.5s ease;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 400px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(40, 167, 69, 0.3);
            transition: all 0.2s;
        }

        button:hover {
            background-color: #218838;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(40, 167, 69, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        /* The style for when the troll activates */
        .troll-text {
            display: none;
            color: white;
            font-size: 50px;
            font-weight: 900;
            text-transform: uppercase;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div class="container" id="main-content">
        <h1>MathSolver Pro</h1>
        <p>Instantly generate step-by-step solutions for Algebra, Calculus, and Geometry.</p>
        <button id="action-btn" onclick="troll()">Unlock Free Answers</button>
    </div>

    <div class="troll-text" id="troll-message">
        YOU'VE BEEN TETO-ED!<br>
    </div>

<script>
    function troll() {
        const btn = document.getElementById('action-btn');
        const content = document.getElementById('main-content');
        const trollMsg = document.getElementById('troll-message');

        // Step 1: Disable button and show fake loading
        btn.disabled = true;
        btn.style.backgroundColor = "#ffc107"; // Changes to warning yellow
        btn.style.color = "#000";
        btn.innerText = "Connecting to database...";

        // Step 2: Build suspense with more fake loading text
        setTimeout(() => {
            btn.innerText = "Bypassing teacher firewalls...";
        }, 1500);

        setTimeout(() => {
            btn.innerText = "Extracting answer keys...";
        }, 3000);

        // Step 3: The big reveal
        setTimeout(() => {
            // Hide the normal content
            content.style.display = "none";
            
            // Turn the background red and show the troll message
            document.body.style.backgroundColor = "#ff0000";
            trollMsg.style.display = "block";

            // Step 4: The Rickroll redirect after showing the message for 2 seconds
            setTimeout(() => {
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
            }, 2500);

        }, 4500); // This happens 4.5 seconds after they first click
    }
</script>

</body>
</html>
